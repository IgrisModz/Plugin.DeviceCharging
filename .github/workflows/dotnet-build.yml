name: Build

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md

env:
  TOOLKIT_NET_VERSION: '10.0.100'
  LATEST_NET_VERSION: '10.0.X'
  PathToLibrarySolution: 'src/Plugin.DeviceCharging.slnx'
  PathToSampleSolution: 'samples/Plugin.DeviceCharging.Sample.slnx'
  PathToPluginDeviceChargingCsproj: 'src/Plugin.DeviceCharging.UnitTest/Plugin.DeviceCharging.UnitTest.csproj'
  PathToPluginDeviceChargingSampleCsproj: 'samples/Plugin.DeviceCharging.Sample/lugin.DeviceCharging.Sample.csproj'
  PluginDeviceChargingLibrary_Xcode_Version: '26.1'
  PluginDeviceChargingSample_Xcode_Version: '26.2'

jobs:
  build_sample:
    name: Build Sample App using Latest .NET SDK
    runs-on: ${{ matrix.os }}
    strategy:
        fail-fast: false
        matrix:
          os: [ windows-latest, macos-26 ]

    steps:
      - name: Checkout code
      - uses: actions/checkout@v6
    
      - name: Set Latest Xcode Version
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-dotnet@v1
        with:
          xcode-version:  ${{ env.PluginDeviceChargingSample_Xcode_Version }}
      
      - name: Install Latest .NET SDK, v${{ env.LATEST_NET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.LATEST_NET_VERSION }}
          dotnet-quality: 'ga'

      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Install .NET MAUI Workload
        run: |
          dotnet workload install maui
          dotnet workload update

      - name: Display dotnet info
        run: dotnet --info

      - name: Build Community Toolkit Sample
        run: dotnet build -c Release ${{ env.PathToPluginDeviceChargingSampleCsproj }}

  build_library:
    name: Build Library
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, macos-26 ]
    steps:
      - name: Checkout code
        uses: action/checkout@v6

      - name: Set Xcode Version
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.PluginDeviceChargingLibrary_Xcode_Version }}
          
      - name: Install .NET SDK v${{ env.TOOLKIT_NET_VERSION }}
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.TOOLKIT_NET_VERSION }}
          dotnet-quality: 'ga'

      - uses: actions/setup-java@v5
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Install .NET MAUI Workload
        run: |
          dotnet workload install maui
          dotnet workload update

      - name: Display dotnet info
        run: dotnet --info

      - name: 'Build Plugin.DeviceCharging'
        run: dotnet build ${{ env.PathToPluginDeviceChargingCsproj }} -c Release
